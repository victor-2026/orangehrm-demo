name: Allure TestOps

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Download allurectl
        run: |
          curl -sL https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64 -o allurectl
          chmod +x allurectl

      - name: Run tests with allurectl
        run: |
          ./allurectl watch --token "$ALLURE_TOKEN" --project-id "$ALLURE_PROJECT_ID" --endpoint "$ALLURE_ENDPOINT" -- npm run test:smoke
        env:
          ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT }}
          ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
          ALLURE_PROJECT_ID: ${{ secrets.ALLURE_PROJECT_ID }}
          BASE_URL: https://opensource-demo.orangehrmlive.com

      - name: Upload Allure results (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
